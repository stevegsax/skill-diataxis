# Hugo configuration for the Diataxis documentation site.
#
# This file is user-owned. Edit freely — change the theme, add params,
# override layouts, etc. The skill regenerates authored markdown and
# marimo WASM bundles; it never rewrites this file or layouts/.

title = "Diataxis Documentation Skill"

# Relative URLs make the built site portable (works under `hugo server`,
# any static host, or copied into a subdirectory).
baseURL = "/"
relativeURLs = true
canonifyURLs = false

enableRobotsTXT = true

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      # Hextra supplies its own safe render hooks; allowing unsafe HTML lets
      # authored markdown pass-through raw blocks when it needs to.
      unsafe = true

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

  # Mount the authored quadrant directories into Hugo's content tree.
  # Authored paths stay skill-native (`tutorials/`, `howto/`, etc.); Hugo
  # sees them at `content/tutorials/`, `content/howto/`, etc.
  [[module.mounts]]
    source = "tutorials"
    target = "content/tutorials"
  [[module.mounts]]
    source = "howto"
    target = "content/howto"
  [[module.mounts]]
    source = "reference"
    target = "content/reference"
  [[module.mounts]]
    source = "explanation"
    target = "content/explanation"

  # The Exercises section is optional: it appears only on projects
  # that ship marimo notebooks. The mount is always declared so
  # projects can add notebooks later without editing this file. An
  # empty examples/ directory (or one without _index.md) renders no
  # section.
  [[module.mounts]]
    source = "examples"
    target = "content/examples"

  # Mount the authored homepage.
  [[module.mounts]]
    source = "index.md"
    target = "content/_index.md"

  # Mount diataxis.toml as a Hugo data file so themes can read editorial
  # metadata as `hugo.Data.diataxis` (previously `.Site.Data.diataxis`,
  # deprecated in Hugo 0.156+).
  [[module.mounts]]
    source = "diataxis.toml"
    target = "data/diataxis.toml"

  # Static assets (marimo WASM bundles land under static/exercises/<stem>/).
  [[module.mounts]]
    source = "static"
    target = "static"

[params]
  description = "How to use the skill-diataxis project to create, revise, score, and publish Diataxis-structured documentation"

  [params.math]
    enable = true

  [params.theme]
    default = "system"
    displayToggle = true

  [params.navbar]
    displayTitle = true
    displayLogo = false

  [params.footer]
    enable = true
    displayCopyright = false
    displayPoweredBy = true

  [params.page]
    width = "wide"

  [params.toc]
    displayTags = true

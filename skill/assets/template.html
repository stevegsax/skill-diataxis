<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$title$</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="$cssroot$assets/style.css">
$if(math)$
  $math$
$endif$
</head>
<body>
  <nav class="sidebar" id="sidebar">
    <!-- Sidebar content is injected by the build script -->
  </nav>

  <main>
$if(quadrant)$
    <div class="page-header">
      <span class="quadrant-badge $quadrant$">$quadrant$</span>
      <h1>$title$</h1>
    </div>
$else$
    <h1>$title$</h1>
$endif$

$if(toc)$
    <nav id="TOC" role="doc-toc">
      $table-of-contents$
    </nav>
$endif$

    $body$
  </main>
</body>
</html>

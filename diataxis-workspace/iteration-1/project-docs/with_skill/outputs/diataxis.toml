[project]
name = "Diataxis Documentation Skill"
description = "A Claude Code skill that creates, scores, revises, and publishes documentation structured around the Diataxis framework (tutorials, how-to guides, reference, explanation)."
type = "project-docs"
audience = "Developers and technical writers using Claude Code who want to create structured documentation for their projects or learning paths."
prerequisites = "Familiarity with Claude Code, basic understanding of markdown, and general documentation concepts."

[topics.getting-started]
title = "Getting Started"
description = "Initial setup and first use of the Diataxis skill to create a documentation project."
complexity = "beginner"
order = 1

[topics.getting-started.tutorial]
file = "tutorials/first-documentation-project.md"
status = "draft"
covers = [
    "Triggering the Diataxis skill in Claude Code",
    "Going through the scoping step with grill-me",
    "Reviewing and approving the generated structure document",
    "Generating content for the first topic",
    "Viewing the generated documentation files",
]
detail = """Step-by-step walkthrough creating a small documentation project from \
scratch. Use a simple example project (e.g., a calculator library) so the focus \
stays on the skill workflow, not the subject matter."""
guidance = """Keep the example minimal. Show what the user types and what Claude \
responds with at each step. Show the directory layout after generation. Link to \
the structure document reference for field details. Link to the explanation doc \
for why Diataxis organizes content this way."""

[topics.getting-started.explanation]
file = "explanation/why-diataxis.md"
status = "draft"
covers = [
    "The problem Diataxis solves: documentation that mixes concerns",
    "The two axes: action/cognition and acquisition/application",
    "Why keeping quadrants separate improves documentation quality",
    "When to use project-docs vs learning-path type",
]
detail = """Discursive treatment of the Diataxis framework's rationale. Connect \
to common documentation frustrations developers experience."""
guidance = """Answer 'why use Diataxis' not 'how to use it'. OK to discuss \
alternatives briefly. Do not include step-by-step instructions. Link to the \
tutorial for hands-on experience. Link to the quadrant reference for the \
specific rules."""

[topics.structure-document]
title = "Structure Document"
description = "The diataxis.toml file that serves as the source of truth for a documentation project."
complexity = "intermediate"
prerequisites = ["getting-started"]
order = 2

[topics.structure-document.reference]
file = "reference/structure-document-schema.md"
status = "draft"
covers = [
    "Project-level fields (name, description, type, audience, prerequisites)",
    "Topic fields (title, description, complexity, prerequisites, order)",
    "Quadrant fields (file, status, covers, detail, guidance, exercises)",
    "Status values and their meanings",
    "Rules for topic slugs and file paths",
]
detail = """Tabular format for field definitions. One table per section (project, \
topic, quadrant). Include type, required/optional, and description for each field."""
guidance = """Structure mirrors the TOML schema hierarchy. Use consistent table \
formatting throughout. Include brief examples showing valid values. Do not \
explain why fields exist — link to explanation. Link to how-to for editing the \
structure document."""

[topics.structure-document.howto]
file = "howto/edit-structure-document.md"
status = "draft"
covers = [
    "Adding a new topic to an existing project",
    "Removing a quadrant from a topic",
    "Changing topic ordering and prerequisites",
    "Updating guidance after receiving scoring feedback",
]
detail = """Concise task-oriented steps. Each task is a separate section with \
numbered steps. Assume the reader already has a working diataxis.toml."""
guidance = """Title must follow 'How to' pattern. Do not teach the schema — link \
to reference. Include the principle that structure is always updated before \
content. Link to the scoring how-to for the revision cycle."""

[topics.workflow]
title = "Workflow"
description = "The end-to-end lifecycle of a Diataxis documentation project: scope, structure, generate, score, revise, build."
complexity = "intermediate"
prerequisites = ["getting-started", "structure-document"]
order = 3

[topics.workflow.reference]
file = "reference/quadrant-rules.md"
status = "draft"
covers = [
    "Tutorial rules: what tutorials must and must not do",
    "How-to guide rules: what how-to guides must and must not do",
    "Reference rules: what reference docs must and must not do",
    "Explanation rules: what explanation docs must and must not do",
    "Cross-referencing rules between quadrants",
    "The compass: classifying content by action/cognition and acquisition/application",
]
detail = """Tabular summaries of must-do and must-not-do rules per quadrant. \
Include the language patterns and structural rules for each type."""
guidance = """Use consistent table format across all four quadrants. Include the \
cross-referencing table. This is a pure reference — no narrative about why the \
rules exist (link to explanation). No instructions on how to apply them (link to \
how-to)."""

[topics.workflow.howto]
file = "howto/score-and-revise.md"
status = "draft"
covers = [
    "Running a scoring pass on existing documentation",
    "Interpreting the scores.toml output",
    "Addressing cross-contamination findings",
    "Re-scoring after revisions to verify improvement",
]
detail = """Task-focused steps for the score-revise cycle. Each section addresses \
a specific task the user wants to accomplish."""
guidance = """Assume the user already has generated documentation and wants to \
improve it. Do not teach what scoring is — link to explanation. Link to the \
quadrant rules reference for the specific criteria being scored."""

[topics.build-pipeline]
title = "Build and Publish"
description = "The build pipeline that transforms markdown and marimo notebooks into HTML documentation."
complexity = "intermediate"
prerequisites = ["getting-started"]
order = 4

[topics.build-pipeline.reference]
file = "reference/build-pipeline.md"
status = "draft"
covers = [
    "Build script CLI usage and arguments",
    "Build pipeline steps: validate, generate landing pages, convert, insert iframes, navigate, copy assets",
    "Marimo integration: ASGI app configuration and ports",
    "Serve command: static server and marimo server",
    "Directory structure after build",
]
detail = """Technical description of each pipeline stage. Include CLI usage, \
default ports, and directory layout. Tabular where possible."""
guidance = """Describe the pipeline — do not instruct on how to use it (link to \
how-to). Use code blocks for CLI examples. Include the directory tree showing \
the _build output structure. Mirror the structure of the build.py script."""

[topics.build-pipeline.howto]
file = "howto/build-and-serve.md"
status = "draft"
covers = [
    "Building the documentation from diataxis.toml",
    "Serving documentation locally with both static and marimo servers",
    "Rebuilding after content changes",
]
detail = """Short, actionable steps for building and serving. Assume the reader \
has a complete diataxis project with content files."""
guidance = """Title must follow 'How to' pattern. Do not explain the pipeline \
internals — link to the build pipeline reference. Keep it concise: the reader \
wants to see their docs in a browser, not learn about pandoc."""

[project]
name = "Fractions for Adults"
description = "A learning path covering fractions from fundamentals through complex operations, designed for adults refreshing high school math."
type = "learning-path"
audience = "Adults revisiting fractions after time away from formal math education. Comfortable with basic arithmetic (addition, subtraction, multiplication, division of whole numbers)."
prerequisites = "Whole number arithmetic, basic understanding of division as sharing/grouping."

# --- Topic 1: Fraction Fundamentals ---

[topics.fraction-fundamentals]
title = "Fraction Fundamentals"
description = "What fractions are, how to read and write them, how equivalent fractions work, and an introduction to mixed numbers."
complexity = "beginner"
order = 1

[topics.fraction-fundamentals.tutorial]
file = "tutorials/fraction-fundamentals.md"
status = "revised"
covers = [
    "Identifying the numerator and denominator",
    "Reading and writing fractions from visual models",
    "Finding equivalent fractions by multiplying or dividing both parts",
    "Simplifying fractions to lowest terms",
    "Understanding mixed numbers and improper fractions",
]
detail = """Step-by-step walkthrough using concrete examples (pizza slices, \
measuring cups). Show results at every step. Keep explanations minimal — \
link to the explanation doc for the 'why'."""
guidance = """Use first-person plural ('we will...'). Start with a goal statement. \
Each step must produce a visible result. End with a summary of what was accomplished. \
Link to explanation/fraction-fundamentals.md and reference/fraction-operations.md. \
REVISION FEEDBACK: Use concrete examples with specific real numbers throughout — \
avoid abstract placeholders. Every step should show an actual numeric computation \
the reader can follow. Add a section on mixed numbers covering what they are, \
converting between mixed numbers and improper fractions with worked examples using \
real numbers."""
exercises = [
    "exercises/fraction-fundamentals.py",
]

[topics.fraction-fundamentals.explanation]
file = "explanation/fraction-fundamentals.md"
status = "draft"
covers = [
    "Why fractions exist and what problem they solve",
    "The relationship between fractions and division",
    "Why equivalent fractions represent the same value",
    "How fractions connect to decimals and percentages",
]
detail = """Discursive, connecting fractions to everyday intuition. Use real-world \
contexts the adult audience will recognize. Discuss history briefly."""
guidance = """Answer 'why' not 'how'. Connect to the audience's life experience. \
Acknowledge that fractions feel harder than they are and explain why. \
Link to tutorials/fraction-fundamentals.md for hands-on practice."""

[topics.fraction-fundamentals.reference]
file = "reference/fraction-operations.md"
status = "draft"
covers = [
    "Fraction notation and terminology",
    "Proper fractions, improper fractions, and mixed numbers",
    "Rules for equivalent fractions",
    "Rules for simplifying fractions",
    "Conversion between improper fractions and mixed numbers",
]
detail = """Tabular format for rules and definitions. Brief illustrative examples \
(1-2 per rule). No narrative prose."""
guidance = """Use consistent table formatting throughout. Every rule gets the same \
treatment: name, rule statement, example. Link to howto guides for practical usage."""

# --- Topic 2: Adding and Subtracting Fractions ---

[topics.adding-subtracting]
title = "Adding and Subtracting Fractions"
description = "How to add and subtract fractions with like and unlike denominators, including mixed numbers."
complexity = "beginner"
prerequisites = ["fraction-fundamentals"]
order = 2

[topics.adding-subtracting.tutorial]
file = "tutorials/adding-subtracting.md"
status = "revised"
covers = [
    "Adding fractions with the same denominator",
    "Finding a common denominator using the LCD",
    "Adding fractions with different denominators",
    "Subtracting fractions with like and unlike denominators",
    "Adding and subtracting mixed numbers",
]
detail = """Guided walkthrough progressing from same-denominator to unlike-denominator \
cases. Use a recipe context (measuring cups) as the running example."""
guidance = """Show every intermediate step. Never skip the 'find the LCD' step even \
when it seems obvious. Link to reference/fraction-operations.md for the LCD rules. \
Link to explanation/fraction-fundamentals.md for 'why common denominators.' \
REVISION FEEDBACK: Use concrete examples with specific real numbers at every step — \
the previous version was too abstract. Show the actual arithmetic (e.g. 'multiply 3 \
by 4 to get 12') rather than describing it generically. Include multiple worked \
examples per concept, not just one. The mixed numbers section should have more \
detail with additional worked examples including subtraction of mixed numbers."""
exercises = [
    "exercises/adding-subtracting.py",
]

[topics.adding-subtracting.howto]
file = "howto/add-subtract-fractions.md"
status = "draft"
covers = [
    "How to add fractions with different denominators",
    "How to subtract a fraction from a whole number",
    "How to add mixed numbers that require carrying",
]
detail = """Task-focused, concise steps. Assume the reader knows what fractions and \
denominators are. No teaching."""
guidance = """Title starts with 'How to'. Each task is a self-contained set of steps. \
Include a 'before you begin' note if the task has prerequisites. \
Link to reference/fraction-operations.md for full rules."""

# --- Topic 3: Multiplying and Dividing Fractions ---

[topics.multiplying-dividing]
title = "Multiplying and Dividing Fractions"
description = "How to multiply and divide fractions and mixed numbers, including the reciprocal method."
complexity = "intermediate"
prerequisites = ["fraction-fundamentals"]
order = 3

[topics.multiplying-dividing.tutorial]
file = "tutorials/multiplying-dividing.md"
status = "revised"
covers = [
    "Multiplying two fractions",
    "Multiplying a fraction by a whole number",
    "The reciprocal of a fraction",
    "Dividing fractions using the reciprocal method",
    "Multiplying and dividing mixed numbers",
]
detail = """Step-by-step with a real-world context (scaling a recipe, splitting \
quantities). Show each computation in full."""
guidance = """Emphasize that multiplication of fractions is simpler than addition — \
no common denominator needed. For division, build up to 'invert and multiply' \
through a concrete example before stating the rule. Link to explanation for \
why invert-and-multiply works. \
REVISION FEEDBACK: Use concrete examples with specific real numbers at every step. \
Show every arithmetic operation explicitly (e.g. '2 times 3 equals 6, and 3 times \
5 equals 15, so the result is 6/15'). Include a second worked example for each \
operation so the reader can see the pattern. The mixed numbers section needs more \
concrete detail with multiple worked examples."""

[topics.multiplying-dividing.howto]
file = "howto/multiply-divide-fractions.md"
status = "draft"
covers = [
    "How to multiply fractions and simplify the result",
    "How to divide fractions",
    "How to scale a recipe using fraction multiplication",
]
detail = """Concise, task-focused. Assume the reader knows fraction basics."""
guidance = """Title starts with 'How to'. Link to reference for rules. \
Include cross-cancellation as an efficiency tip, not a required step."""

[topics.multiplying-dividing.explanation]
file = "explanation/multiplying-dividing.md"
status = "draft"
covers = [
    "Why multiplying fractions does not require a common denominator",
    "Why 'invert and multiply' works for division",
    "Why multiplying fractions gives a smaller result",
    "The geometric interpretation of fraction multiplication (area model)",
]
detail = """Discursive, building intuition. Use visual/geometric reasoning \
where possible. Connect to the audience's existing understanding of whole numbers."""
guidance = """This is the 'aha' document — help the reader see why the rules make \
sense rather than just memorizing them. Link to the tutorial for practice."""

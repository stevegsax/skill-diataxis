[project]
name = "Local LLM Fine-Tuning"
description = "A learning path for fine-tuning large language models on a local computer, covering dataset preparation, model selection, training with parameter-efficient methods (LoRA/QLoRA), running training, and evaluation."
type = "learning-path"
audience = "Developers and ML practitioners who are comfortable with Python and have a local machine with a GPU (or access to one), but have not fine-tuned an LLM before."
prerequisites = "Basic Python programming, familiarity with pip/conda environments, general understanding of what LLMs are and what they do. No prior ML training experience required."

# ---------------------------------------------------------------------------
# Topic 1: Environment Setup
# ---------------------------------------------------------------------------

[topics.environment-setup]
title = "Environment Setup"
description = "Setting up Python, CUDA, and the required libraries (transformers, PEFT, bitsandbytes, unsloth) for local fine-tuning."
complexity = "beginner"
order = 1

[topics.environment-setup.tutorial]
file = "tutorials/environment-setup.md"
status = "draft"
covers = [
    "Installing Python 3.10+ and creating a virtual environment",
    "Installing PyTorch with CUDA support",
    "Installing Hugging Face transformers, datasets, PEFT, bitsandbytes, trl",
    "Verifying GPU availability and VRAM",
    "Optional: installing unsloth for faster training",
]
detail = """Step-by-step walkthrough that results in a working environment. \
Show verification commands at each stage. Target a single NVIDIA GPU with \
8-24 GB VRAM as the baseline."""
guidance = """Keep it to one path — do not present conda vs pip options. \
Use pip throughout. Show expected output after each install/verify step. \
Link to reference for full library version matrix."""
exercises = [
    "exercises/environment-check.py",
]

[topics.environment-setup.reference]
file = "reference/environment-requirements.md"
status = "draft"
covers = [
    "Minimum and recommended hardware specs (GPU VRAM, RAM, disk)",
    "Python and CUDA version compatibility matrix",
    "Library version pinning table (transformers, PEFT, bitsandbytes, trl, unsloth)",
    "Environment variables that affect training (CUDA_VISIBLE_DEVICES, HF_HOME, etc.)",
]
detail = "Tabular format. Version numbers and compatibility constraints."
guidance = """Use tables for version matrices. No narrative. Keep current \
as of early 2026. Link to how-to for troubleshooting setup issues."""

# ---------------------------------------------------------------------------
# Topic 2: Dataset Preparation
# ---------------------------------------------------------------------------

[topics.dataset-preparation]
title = "Dataset Preparation"
description = "Selecting, formatting, and preprocessing datasets for instruction fine-tuning."
complexity = "beginner"
prerequisites = ["environment-setup"]
order = 2

[topics.dataset-preparation.tutorial]
file = "tutorials/dataset-preparation.md"
status = "draft"
covers = [
    "Loading a dataset from Hugging Face Hub",
    "Understanding instruction-tuning data formats (Alpaca, ChatML, ShareGPT)",
    "Converting raw data into the required prompt template format",
    "Splitting data into train/validation sets",
    "Tokenizing and inspecting token lengths",
]
detail = """Hands-on walkthrough using a small public dataset (e.g., tatsu-lab/alpaca). \
Show data at every transformation step. Result: a tokenized dataset object ready for training."""
guidance = """Use the Alpaca format as the single path. Show actual data samples \
after each transformation. Do not explain tokenization theory — link to explanation. \
Link to reference for format specifications."""
exercises = [
    "exercises/dataset-formatting.py",
]

[topics.dataset-preparation.howto]
file = "howto/prepare-custom-dataset.md"
status = "draft"
covers = [
    "How to convert a CSV/JSON file of your own data into instruction-tuning format",
    "How to handle multi-turn conversation data",
    "How to filter and deduplicate training data",
    "How to balance dataset categories",
]
detail = "Task-focused. Assume the reader understands the data formats from the tutorial."
guidance = """Title: 'How to Prepare a Custom Dataset for Fine-Tuning'. \
Each section is a separate task. Link to reference for format specs."""

[topics.dataset-preparation.reference]
file = "reference/dataset-formats.md"
status = "draft"
covers = [
    "Alpaca format specification and field descriptions",
    "ChatML format specification",
    "ShareGPT format specification",
    "Hugging Face datasets library key functions and parameters",
    "Token length statistics and truncation behavior",
]
detail = "Tabular where possible. Include exact field names, types, and constraints."
guidance = """One table per format. Show a minimal example for each. \
No narrative — just the specs."""

[topics.dataset-preparation.explanation]
file = "explanation/why-data-format-matters.md"
status = "draft"
covers = [
    "Why instruction tuning requires structured prompt templates",
    "How the model learns the boundary between instruction and response",
    "The relationship between data quality and fine-tuned model quality",
    "Tradeoffs between dataset size and quality",
]
detail = "Discursive. Connect to how the model actually processes tokens during training."
guidance = """Answer 'why do I need to format my data this way?' at an intuitive \
level. Discuss the attention mask and loss masking concepts without getting into \
the linear algebra. Link to tutorial for hands-on practice."""

# ---------------------------------------------------------------------------
# Topic 3: Model Selection
# ---------------------------------------------------------------------------

[topics.model-selection]
title = "Model Selection"
description = "Choosing a base model for fine-tuning based on task, hardware constraints, and licensing."
complexity = "intermediate"
prerequisites = ["environment-setup"]
order = 3

[topics.model-selection.howto]
file = "howto/choose-base-model.md"
status = "draft"
covers = [
    "How to evaluate VRAM requirements for a given model size",
    "How to check model licenses on Hugging Face Hub",
    "How to select between model families (Llama, Mistral, Gemma, Qwen, Phi)",
    "How to decide between full-precision and quantized base models",
]
detail = "Decision-oriented. Provide concrete decision criteria, not exhaustive lists."
guidance = """Title: 'How to Choose a Base Model for Local Fine-Tuning'. \
Use a decision flowchart approach. Link to reference for the model comparison table."""

[topics.model-selection.reference]
file = "reference/model-comparison.md"
status = "draft"
covers = [
    "Model families suitable for local fine-tuning (Llama 3.x, Mistral, Gemma 2, Qwen 2.5, Phi-3/4)",
    "Parameter counts, VRAM requirements at different quantization levels",
    "License types and commercial use restrictions",
    "Benchmark performance summary (MMLU, HumanEval, etc.)",
]
detail = "Large comparison table. Factual. Updated for models available as of early 2026."
guidance = """One master table with all models. Columns: family, params, VRAM (fp16), \
VRAM (4-bit), license, key benchmarks. No recommendations — just facts."""

[topics.model-selection.explanation]
file = "explanation/understanding-model-sizes.md"
status = "draft"
covers = [
    "Why parameter count correlates with capability but not linearly",
    "How quantization reduces VRAM usage and what it trades away",
    "Why smaller fine-tuned models can outperform larger general models on specific tasks",
    "The relationship between base model quality and fine-tuning outcomes",
]
detail = "Discursive. Help the reader build intuition about model scaling."
guidance = """Use concrete analogies. Discuss the 'specialist vs generalist' \
framing. Do not include step-by-step instructions."""

# ---------------------------------------------------------------------------
# Topic 4: Training Configuration (LoRA/QLoRA)
# ---------------------------------------------------------------------------

[topics.training-configuration]
title = "Training Configuration (LoRA/QLoRA)"
description = "Configuring parameter-efficient fine-tuning with LoRA and QLoRA, including hyperparameter selection."
complexity = "intermediate"
prerequisites = ["environment-setup", "dataset-preparation", "model-selection"]
order = 4

[topics.training-configuration.tutorial]
file = "tutorials/configure-qlora-training.md"
status = "draft"
covers = [
    "Loading a base model with 4-bit quantization (QLoRA setup)",
    "Creating a LoRA configuration with PEFT",
    "Setting up TrainingArguments (learning rate, batch size, epochs, gradient accumulation)",
    "Creating an SFTTrainer instance with all components connected",
    "Verifying the configuration before training starts",
]
detail = """Step-by-step with a specific model (e.g., Llama 3.1 8B or Mistral 7B). \
Show the actual Python code and the output of each configuration step. \
Result: a fully configured trainer ready to call .train()."""
guidance = """One path: QLoRA with SFTTrainer from trl. Do not present LoRA vs QLoRA \
as a choice — use QLoRA throughout (it is the practical default for local training). \
Show model.print_trainable_parameters() output. Link to reference for all hyperparameters. \
Link to explanation for why LoRA works."""
exercises = [
    "exercises/training-config.py",
]

[topics.training-configuration.howto]
file = "howto/tune-hyperparameters.md"
status = "draft"
covers = [
    "How to adjust batch size and gradient accumulation for your VRAM",
    "How to set learning rate and scheduler for stable training",
    "How to choose LoRA rank and alpha values",
    "How to configure target modules for different model architectures",
]
detail = "Practical adjustments. Each section is a standalone task."
guidance = """Title: 'How to Tune Hyperparameters for Local Fine-Tuning'. \
Include the VRAM calculation formula for batch size. Link to reference for defaults."""

[topics.training-configuration.reference]
file = "reference/training-hyperparameters.md"
status = "draft"
covers = [
    "LoraConfig parameters (r, alpha, dropout, target_modules, task_type)",
    "BitsAndBytesConfig parameters for 4-bit quantization",
    "TrainingArguments parameters relevant to fine-tuning",
    "SFTTrainer parameters and dataset configuration options",
]
detail = "Complete parameter tables with types, defaults, and valid ranges."
guidance = """One table per configuration class. Columns: parameter, type, default, \
description, typical range. No narrative."""

[topics.training-configuration.explanation]
file = "explanation/how-lora-works.md"
status = "draft"
covers = [
    "Why full fine-tuning is impractical on consumer hardware",
    "The low-rank adaptation idea: what LoRA actually does to the weight matrices",
    "How QLoRA combines quantization with LoRA to reduce memory further",
    "The relationship between LoRA rank, expressiveness, and overfitting",
    "Why certain layers (attention projections) are targeted by default",
]
detail = "Conceptual explanation with diagrams described in text. No code."
guidance = """This is the key conceptual piece. Use the 'adding a small correction \
to frozen weights' analogy. Explain rank with a concrete example (e.g., a 4096x4096 \
matrix decomposed into 4096x16 and 16x4096). Do not include training steps."""

# ---------------------------------------------------------------------------
# Topic 5: Running Training
# ---------------------------------------------------------------------------

[topics.running-training]
title = "Running Training"
description = "Executing the training run, monitoring progress, and handling common issues."
complexity = "intermediate"
prerequisites = ["training-configuration"]
order = 5

[topics.running-training.tutorial]
file = "tutorials/run-training.md"
status = "draft"
covers = [
    "Starting the training run",
    "Reading and interpreting the training log output",
    "Monitoring GPU memory usage during training",
    "Saving checkpoints and the final adapter",
    "Loading and testing the fine-tuned model with a sample prompt",
]
detail = """The payoff tutorial. The learner runs training and sees results. \
Use a small dataset subset (1000 examples) so training completes in minutes. \
Show expected output at every stage."""
guidance = """This tutorial follows directly from the training configuration tutorial. \
Show the actual training log output. Include timing expectations ('on a 3090, this \
takes approximately 5 minutes'). End with a visible result: the model generating \
a response that shows fine-tuning worked. Link to how-to for troubleshooting."""
exercises = [
    "exercises/run-and-evaluate.py",
]

[topics.running-training.howto]
file = "howto/troubleshoot-training.md"
status = "draft"
covers = [
    "How to fix CUDA out-of-memory errors",
    "How to resume training from a checkpoint",
    "How to handle NaN loss values",
    "How to diagnose slow training speed",
    "How to use gradient checkpointing to reduce memory",
]
detail = "Problem-solution format. Each section is a standalone fix."
guidance = """Title: 'How to Troubleshoot Common Training Issues'. \
Start each section with the error message or symptom. Provide the fix immediately. \
Link to explanation for why these issues occur."""

# ---------------------------------------------------------------------------
# Topic 6: Evaluation and Iteration
# ---------------------------------------------------------------------------

[topics.evaluation]
title = "Evaluation and Iteration"
description = "Evaluating the fine-tuned model's quality and iterating on the training process."
complexity = "advanced"
prerequisites = ["running-training"]
order = 6

[topics.evaluation.tutorial]
file = "tutorials/evaluate-model.md"
status = "draft"
covers = [
    "Loading the fine-tuned adapter on top of the base model",
    "Running inference with the fine-tuned model",
    "Comparing outputs: base model vs fine-tuned model on the same prompts",
    "Computing a simple evaluation metric (e.g., ROUGE or manual quality scoring)",
    "Merging LoRA weights into the base model for deployment",
]
detail = """Hands-on comparison showing the fine-tuning effect. The learner sees \
concrete before/after differences. End with a merged model saved to disk."""
guidance = """Show side-by-side outputs. Use 3-5 test prompts that clearly demonstrate \
improvement. Include the merge step as the natural endpoint. Link to explanation \
for evaluation methodology discussion."""
exercises = [
    "exercises/model-evaluation.py",
]

[topics.evaluation.howto]
file = "howto/iterate-on-results.md"
status = "draft"
covers = [
    "How to identify whether the model is underfitting or overfitting",
    "How to adjust training duration based on loss curves",
    "How to improve results by curating the dataset",
    "How to export and share the fine-tuned model",
]
detail = "Decision-oriented. Help the reader take the right next step."
guidance = """Title: 'How to Iterate on Fine-Tuning Results'. \
Focus on actionable diagnostics. Link to reference for metric definitions."""

[topics.evaluation.explanation]
file = "explanation/evaluation-strategies.md"
status = "draft"
covers = [
    "Why loss alone is insufficient for evaluating fine-tuned LLMs",
    "The challenge of evaluating generative models vs classifiers",
    "Automated metrics vs human evaluation: tradeoffs",
    "Overfitting in fine-tuning: what it looks like and why it matters",
    "When to stop: diminishing returns in fine-tuning",
]
detail = "Discursive. Help the reader develop judgment about model quality."
guidance = """Connect to the reader's likely experience: 'the loss went down but \
the outputs are worse — why?' Discuss memorization vs generalization. \
Do not include evaluation code — link to tutorial."""
